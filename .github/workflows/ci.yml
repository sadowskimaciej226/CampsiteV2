name: Build and Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-booking:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u sadowskimaciej226 --password-stdin

      - name: Build image
        run: |
          docker build \
          -t ghcr.io/sadowskimaciej226/campsitev2/booking-service:latest \
          ./services/BookingService

      - name: Push image
        run: docker push ghcr.io/sadowskimaciej226/campsitev2/booking-service:latest