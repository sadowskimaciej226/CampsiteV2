apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: ghcr.io/sadowskimaciej226/campsitev2/booking-service:ad88ce520331857ba22c4514308592cc565a2002
          ports:
            - containerPort: 8080
