apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: ghcr.io/sadowskimaciej226/campsitev2/booking-service:82bfc837a6105be83c4aac99f2f52bfe9c177c54
          ports:
            - containerPort: 8080
